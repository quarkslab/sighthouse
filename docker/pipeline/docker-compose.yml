services:
  redis:
    image: redis:7
    hostname: redis
    user: "1000:1000"
    volumes:
      - ./data/redis:/data
    networks:
      - internal-net

  rustfs:
    image: rustfs/rustfs:latest
    hostname: rustfs
    user: "1000:1000"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=admin
      - RUSTFS_SECRET_KEY=password
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=:9000
      - RUSTFS_CONSOLE_ADDRESS=:9001
    volumes:
      - ./data/rustfs:/data
    networks:
      - internal-net
      - external-net

  createbuckets:
    image: rustfs/rc:latest
    depends_on:
      - rustfs
    restart: on-failure
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until rc alias set dockerrustfs http://rustfs:9000 admin password; do echo waiting rustfs; sleep 2; done
        rc mb dockerrustfs/uploads || true
        rc anonymous set download dockerrustfs/uploads || true
    networks:
      - internal-net

  bsim_postgres:
    image: ${BASE_URL}/ghidra-bsim-postgres:${VERSION}
    hostname: bsim_postgres
    volumes:
      - ./data/postgres:/home/user/ghidra-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/ghidra/Ghidra/Features/BSim/support/pg_is_ready.sh || exit 1 "]
      retries: 5
      interval: "30s"
      timeout: "5s"
    networks:
      - internal-net

  create_bsim_db_postgres:
    image: ${BASE_URL}/create_bsim_db:${VERSION}
    command: 'user "" bsim_postgres postgresql 5432'
    depends_on:
      bsim_postgres:
        condition: service_healthy
    restart: no
    networks:
      - internal-net

  ghidra_analyzer:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "GhidraAnalyzer",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
      "-g", "/ghidra",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_Ghidra_Analyzer_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - bsim_postgres
      - rustfs
      - redis
    networks:
      - internal-net

  # --- PlatformIO ---
  platformio_compiler:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "PlatformIoCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_PlatformIo_Compiler_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      ghidra_analyzer:
        condition: service_healthy
    networks:
      - internal-net
      - external-net

  platformio_preprocessor:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "PlatformIoPreprocessor",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_PlatformIo_Preprocessor_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      platformio_compiler:
        condition: service_healthy
    networks:
      - internal-net
      - external-net

  platformio_scrapper:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "PlatformIoScrapper",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
      "-d", "sqlite:////data/platformio.db",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_PlatformIo_Scrapper_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      platformio_preprocessor:
        condition: service_healthy
    networks:
      - internal-net
      - external-net
    user: "1000:1000"
    volumes:
      - ./data/pio:/data

  # --- Linux Kernel ---
  kernel_compiler:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "LinuxKernelCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_Linux_Kernel_Compiler_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      ghidra_analyzer:
        condition: service_healthy
    networks:
      - internal-net

  # --- uClibc ---
  uclibc_compiler:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "uClibcCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_uClibc_Compiler_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      ghidra_analyzer:
        condition: service_healthy
    networks:
      - internal-net

  uclibc_preprocessor:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "uClibcPreprocessor",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_uClibc_Preprocessor_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      uclibc_compiler:
        condition: service_healthy
    networks:
      - internal-net
      - external-net

  # --- Autotools (glibc / openssl) ---
  autotools_compiler:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "AutotoolsCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_Autotools_Compiler_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      ghidra_analyzer:
        condition: service_healthy
    networks:
      - internal-net

  # --- Git Scrapper (kernel / uclibc / glibc / openssl entry point) ---
  git_scrapper:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "GitScrapper",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    healthcheck:
      test: ["CMD-SHELL", "ls /tmp/sighthouse_Git_Scrapper_*.ready 2>/dev/null | grep -q ."]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      kernel_compiler:
        condition: service_healthy
      uclibc_preprocessor:
        condition: service_healthy
      autotools_compiler:
        condition: service_healthy
    networks:
      - internal-net
      - external-net

  create_recipe:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    command: [
      "pipeline",
      "-r", "s3://admin:password@rustfs:9000/uploads",
      "-w", "redis://redis:6379/0",
      "start", "pipeline.yml",
    ]
    volumes:
      - ./data/pipeline.yml:/work/pipeline.yml:ro
    depends_on:
      platformio_scrapper:
        condition: service_healthy
      git_scrapper:
        condition: service_healthy
    restart: on-failure
    networks:
      - internal-net

networks:
  internal-net:
    driver: bridge
    internal: true  # Blocks host access
  external-net:
    driver: bridge
