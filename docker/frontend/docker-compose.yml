version: '3.8'
services:
  redis:
    image: redis:7
    hostname: redis
    volumes:
      - ./data/redis:/data
    networks:
      - internal-net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    hostname: minio
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=password
    command: 'minio server --console-address ":9001" /data'
    volumes:
      - ./data/minio:/data
    # ports:
    #   - "9000:9000"
    #   - "9001:9001"
    networks:
      - internal-net

  createbuckets:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      /usr/bin/mc alias set dockerminio http://minio:9000 admin password;
      /usr/bin/mc mb dockerminio/frontend;
      /usr/bin/mc anonymous set public dockerminio/frontend;
      exit 0;
      "
    networks:
      - internal-net

  bsim_postgres:
    image: ${BASE_URL}/ghidra-bsim-postgres:1.0.1
    hostname: bsim_postgres
    volumes:
      - ./data/bsim:/home/user/ghidra-data
    # ports:
    #   - 5432:5432
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/ghidra/Ghidra/Features/BSim/support/pg_is_ready.sh || exit 1 "]
      retries: 5
      interval: "30s"
      timeout: "5s"
    networks:
      - internal-net

  frontend_postgres:
    image: postgres:15
    hostname: frontend_postgres
    environment:
      POSTGRES_DB: frontend 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password 
    #ports:
    #  - "5432:5432"
    volumes:
      - ./data/frontend:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d frontend"]
      retries: 5
      interval: "30s"
      timeout: "5s"
    networks:
      - internal-net

  create_user:
    image: ${BASE_URL}/sighthouse-frontend:1.0.1
    entrypoint: '/home/user/.local/bin/sighthouse'
    command: "frontend -d 'postgresql://user:password@frontend_postgres:5432/frontend' add-user user -p password"
    restart: no
    volumes:
      - ./data/frontend:/data
    depends_on:
      frontend_postgres:
        condition: service_healthy
        restart: true
    networks:
      - internal-net

  sighthouse_frontend:
    image: ${BASE_URL}/sighthouse-frontend:1.0.1
    hostname: sighthouse_frontend
    restart: unless-stopped
    entrypoint: '/home/user/.local/bin/sighthouse'
    command: 'frontend -g /ghidra -d postgresql://user:password@frontend_postgres:5432/frontend -r s3://minio:9000/frontend start -w redis://redis:6379/0 -b postgresql://user@bsim_postgres:5432/bsim --worker 4'
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:6671/api/v1/ping || exit 1 "]
      retries: "5"
      interval: "60s"
      timeout: "5s"
    depends_on:
      - create_user
      - bsim_postgres
      - redis
    networks:
      - internal-net
      - app-net

  proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    depends_on:
      - sighthouse_frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - app-net

networks:
  app-net:
    driver: bridge
  internal-net:
    driver: bridge
    internal: true  # Blocks host access
