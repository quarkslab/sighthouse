version: '3.8'
services:
  redis:
    image: redis:7
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  rustfs:
    image: rustfs/rustfs:latest
    hostname: rustfs
    user: "1000:1000"
    environment:
      - RUSTFS_ACCESS_KEY=admin
      - RUSTFS_SECRET_KEY=password
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=:9000
      - RUSTFS_CONSOLE_ADDRESS=:9001
    volumes:
      - ./data/rustfs:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  createbuckets:
    image: rustfs/rc:latest
    depends_on:
      - rustfs
    restart: on-failure
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until rc alias set dockerrustfs http://rustfs:9000 admin password; do echo waiting rustfs; sleep 2; done
        rc mb dockerrustfs/uploads || true
        rc anonymous set download dockerrustfs/uploads || true

  bsim_postgres:
    image: ${BASE_URL}/ghidra-bsim-postgres:${VERSION}
    hostname: bsim_postgres
    volumes:
      - ./data/postgres:/home/user/ghidra-data
    restart: unless-stopped
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "/ghidra/Ghidra/Features/BSim/support/pg_is_ready.sh || exit 1 "]
      retries: 5
      interval: "30s"
      timeout: "5s"

  create_bsim_db_postgres:
    image: ${BASE_URL}/create_bsim_db:${VERSION} 
    command: 'user "" bsim_postgres postgresql 5432'
    depends_on:
      bsim_postgres:
        condition: service_healthy
    restart: no

  ghidra_analyzer1:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "GhidraAnalyzer",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
      "-g", "/ghidra",
    ]
    depends_on:
      - bsim_postgres
      - rustfs
      - redis

  ghidra_analyzer2:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "GhidraAnalyzer",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
      "-g", "/ghidra",
    ]
    depends_on:
      - bsim_postgres
      - rustfs
      - redis

  autotools_compiler1: 
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "AutotoolsCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    depends_on:
      - ghidra_analyzer1
      - ghidra_analyzer2

  autotools_compiler2: 
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "AutotoolsCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    depends_on:
      - ghidra_analyzer1
      - ghidra_analyzer2

  uclibc_compiler: 
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "uClibcCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    depends_on:
      - ghidra_analyzer1
      - ghidra_analyzer2

  uclibc_preprocessor: 
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "uClibcPreprocessor",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    depends_on:
      - uclibc_compiler

  kernel_compiler1:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "LinuxKernelCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    depends_on:
      - ghidra_analyzer1
      - ghidra_analyzer2

  kernel_compiler2:
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "LinuxKernelCompiler",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    depends_on:
      - ghidra_analyzer1
      - ghidra_analyzer2

  git_scrapper: 
    image: ${BASE_URL}/sighthouse-pipeline:${VERSION}
    restart: unless-stopped
    command: [
      "package", "run", "-i", "-f", "GitScrapper",
      "-w", "redis://redis:6379/0",
      "-r", "s3://admin:password@rustfs:9000/uploads",
    ]
    depends_on:
      - kernel_compiler1
      - kernel_compiler2
      - uclibc_preprocessor 
      - autotools_compiler1
      - autotools_compiler2
